[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
mypy_path = typestubs

[mypy-pdf2image.*]
# pdf2image ships py.typed but has incomplete annotations in some versions
ignore_missing_imports = False

[mypy-pytesseract.*]
# Using custom type stubs in typestubs/pytesseract/
ignore_missing_imports = False
